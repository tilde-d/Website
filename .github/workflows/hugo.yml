# Builds the Hugo site and deploys it to GitHub Pages on every push to main.
# You push SOURCE only — this workflow builds the HTML. Never commit /public.
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # lets you trigger a manual rebuild from the Actions tab

# Grant GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin your Hugo version. Check https://github.com/gohugoio/hugo/releases
      # and bump this when you upgrade locally so local == CI.
      HUGO_VERSION: 0.147.0
      HUGO_ENVIRONMENT: production
      TZ: America/Denver
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in the PaperMod theme submodule
          fetch-depth: 0          # needed for .Lastmod / .GitInfo

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
